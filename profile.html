<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - My Secret Book</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@500;700&family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Poppins;
  background:linear-gradient(#f4ecdf,#eadbc4);
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:12px;
}

.nav a{
  text-decoration:none;
  padding:8px 16px;
  border-radius:20px;
  color:#d09a36;
  border:1px solid #d09a36;
  font-family:Cinzel;
}

/* TITLE */
.title{
  text-align:center;
  font-family:'Great Vibes';
  font-size:60px;
  color:#d09a36;
}

.subtitle{
  text-align:center;
  font-family:Cinzel;
  margin-top:-10px;
  font-size:18px;
  color:#7a3520;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
  padding:20px;
}

/* PROFILE CARD */
.profile{
  background:#fff8f0;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  background:gold;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-size:30px;
}

.name{
  font-family:Cinzel;
  margin-top:10px;
}

.id{
  color:#7a3520;
  font-size:14px;
}

/* BOOK */
.book{
  background:#fff;
  border-radius:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  overflow:hidden;
}

.page{
  padding:20px;
}

/* TEXT AREA */
textarea{
  width:100%;
  height:200px;
  border-radius:10px;
  padding:10px;
}

/* BUTTON */
button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:20px;
  background:#a22f24;
  color:white;
  cursor:pointer;
}

/* SAVED */
.saved{
  margin-top:20px;
  background:#fff;
  padding:15px;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>
  <div>
    <a href="login.html">Login</a>
    <a href="#">More</a>
  </div>
</div>

<!-- TITLE -->
<div class="title">My Secret Book</div>
<div class="subtitle">Profile</div>

<!-- MAIN -->
<div class="container">

  <!-- PROFILE -->
  <div class="profile">
    <div class="avatar">P</div>
    <div class="name">Prabhat</div>
    <div class="id">Prabhat@mysecretbook</div>
  </div>

  <!-- BOOK -->
  <div>
    <div class="book">

      <!-- LEFT PAGE -->
      <div class="page">
        <h3>Write Secret</h3>
        <textarea id="text"></textarea>
        <button onclick="saveText()">Save</button>
      </div>

      <!-- RIGHT PAGE -->
      <div class="page">
        <h3>Upload Image</h3>
        <input type="file" id="img">
        <button onclick="saveImg()">Save</button>
      </div>

    </div>

    <!-- SAVED -->
    <div class="saved">
      <h3>Saved Data</h3>
      <div id="output"></div>
    </div>

  </div>

</div>

<script>
function saveText(){
  let t=document.getElementById("text").value;
  let d=new Date().toLocaleString();
  let old=localStorage.getItem("text")||"";
  localStorage.setItem("text", old + "<br>"+d+" : "+t);
  show();
}

function saveImg(){
  let file=document.getElementById("img").files[0];
  let reader=new FileReader();
  reader.onload=function(){
    let d=new Date().toLocaleString();
    let old=localStorage.getItem("img")||"";
    localStorage.setItem("img", old + "<br>"+d+"<br><img src='"+reader.result+"' width='100%'>");
    show();
  }
  reader.readAsDataURL(file);
}

function show(){
  document.getElementById("output").innerHTML=
  (localStorage.getItem("text")||"") +
  (localStorage.getItem("img")||"");
}

show();
</script>

</body>
</html>
