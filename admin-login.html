<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - My Secret Book</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --cream:#eadbc4;
      --cream-soft:#f4ecdf;
      --gold:#d09a36;
      --brown:#4b2d1a;
      --card:rgba(255,250,242,0.92);
      --border:rgba(208,154,54,0.28);
      --btn1:#a22f24;
      --btn2:#62130e;
    }

    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
      background:linear-gradient(180deg,var(--cream-soft),var(--cream));
      font-family:"Poppins",sans-serif;
      color:var(--brown);
    }

    .card{
      width:min(460px,96vw);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:28px;
      padding:24px 18px;
      box-shadow:0 24px 36px rgba(0,0,0,.08), inset 0 0 0 1px rgba(255,255,255,.22);
    }

    .title{
      text-align:center;
      font-family:"Cinzel",serif;
      font-size:1.5rem;
      color:#6d2418;
      margin-bottom:10px;
    }

    .sub{
      text-align:center;
      color:#775138;
      font-size:.95rem;
      line-height:1.7;
      margin-bottom:18px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      margin-bottom:7px;
      font-size:.88rem;
      font-weight:600;
      color:#6c4630;
    }

    .field input{
      width:100%;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(208,154,54,.24);
      background:rgba(255,252,247,.92);
      color:#4b2d1a;
      font-size:.95rem;
      outline:none;
      font-family:"Poppins",sans-serif;
    }

    .btn{
      width:100%;
      border:none;
      cursor:pointer;
      padding:16px 18px;
      border-radius:999px;
      color:#fff4e2;
      font-family:"Cinzel",serif;
      font-size:1rem;
      font-weight:700;
      letter-spacing:.4px;
      background:linear-gradient(180deg,var(--btn1) 0%, #761b13 55%, var(--btn2) 100%);
      border:2px solid var(--gold);
      box-shadow:0 12px 20px rgba(0,0,0,.12), inset 0 2px 10px rgba(255,255,255,.14);
    }

    .hint{
      margin-top:14px;
      text-align:center;
      color:#7b5238;
      font-size:.86rem;
      line-height:1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Admin Login</div>
    <div class="sub">My Secret Book admin panel open karne ke liye admin credentials use karein.</div>

    <div class="field">
      <label for="adminEmail">Admin Email</label>
      <input type="email" id="adminEmail" placeholder="Enter admin email">
    </div>

    <div class="field">
      <label for="adminPassword">Admin Password</label>
      <input type="password" id="adminPassword" placeholder="Enter admin password">
    </div>

    <button class="btn" id="adminLoginBtn" type="button">Login as Admin</button>

    <div class="hint">
      Default demo login:<br>
      <strong>admin@mysecretbook.com</strong><br>
      <strong>admin123</strong>
    </div>
  </div>

  <script>
    document.getElementById("adminLoginBtn").addEventListener("click", function() {
      const email = document.getElementById("adminEmail").value.trim().toLowerCase();
      const password = document.getElementById("adminPassword").value;

      if (email === "admin@mysecretbook.com" && password === "admin123") {
        localStorage.setItem("msb_admin_logged_in", "true");
        window.location.href = "admin.html";
      } else {
        alert("Wrong admin login details.");
      }
    });
  </script>
</body>
</html>
