In a world full of noise, My Secret Book gives you silence and comfort. You can capture your memories, share your creativity, and explore your inner world in your own language. This platform is made to feel simple, peaceful, and personal — just like a real diary that understands you.`
},

hi: {
greet: "नमस्ते प्रिय ✨",
text: `My Secret Book आपका व्यक्तिगत डिजिटल स्थान है जहाँ विचार कहानियाँ बनते हैं और भावनाओं को एक सुरक्षित स्थान मिलता है। यह उन लोगों के लिए बनाया गया है जो बिना किसी डर और बिना किसी सीमा के अपने विचार व्यक्त करना चाहते हैं।<br><br>

इस शोर भरी दुनिया में, My Secret Book आपको शांति और सुकून देता है।`
},

or: {
greet: "ନମସ୍କାର ପ୍ରିୟ ✨",

};

function changeLang(lang) {
document.getElementById("about-text").innerHTML = data[lang].text;
document.getElementById("greet").innerText = data[lang].greet;
localStorage.setItem("lang", lang);
}

function loadLang() {
let lang = localStorage.getItem("lang") || "en";
changeLang(lang);
}

window.onload = loadLang;
</script>
