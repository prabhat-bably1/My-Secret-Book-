<script>
/* ===== DROPDOWN CONTROL ===== */

const moreBtn = document.getElementById("moreBtn");
const moreDropdown = document.getElementById("moreDropdown");

if(moreBtn){
  moreBtn.addEventListener("click", function(e){
    e.stopPropagation();
    moreDropdown.classList.toggle("show");
  });
}

/* CLOSE WHEN CLICK OUTSIDE */
document.addEventListener("click", function(){
  if(moreDropdown){
    moreDropdown.classList.remove("show");
  }
});

/* PREVENT CLOSE INSIDE CLICK */
if(moreDropdown){
  moreDropdown.addEventListener("click", function(e){
    e.stopPropagation();
  });
}

/* ===== LOGOUT ===== */
const navLogoutBtn = document.getElementById("navLogoutBtn");

if(navLogoutBtn){
  navLogoutBtn.addEventListener("click", function(e){
    e.preventDefault();

    localStorage.removeItem("loggedInUser");
    localStorage.removeItem("token");

    window.location.href = "login.html";
  });
}

  document.addEventListener("copy", function(e){
  const uid = getCurrentUserUID();
  const text = window.getSelection().toString();

  const watermarkText = text + "\n\n— MySecretBook (" + uid + ")";
  
  e.clipboardData.setData("text/plain", watermarkText);
  e.preventDefault();
});
</script>
