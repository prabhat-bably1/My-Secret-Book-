<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Secret Book</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#efe2d0;
  --maroon:#7d1f19;
  --gold:#c99648;
}

body{
  font-family: Georgia, serif;
  background:var(--bg);
  color:#4c2d19;
}

/* ================= NAVBAR ================= */
.nav-section{
  width:100%;
  position:relative;
}

.nav-image{
  width:100%;
  display:block;
}

/* buttons */
.nav-btn{
  position:absolute;
  transform:translate(-50%,-50%);
  padding:10px 20px;
  border-radius:999px;
  border:1.5px solid #e9cfa6;
  background:rgba(70,12,8,0.2);
  color:#fff4de;
  font-size:.9rem;
}

/* exact positions */
.home{ left:13.5%; top:40%; }
.about{ left:38%; top:52%; }
.login{ left:62%; top:52%; }
.more{ left:83%; top:40%; }

/* ================= TITLE ================= */
.hero{
  text-align:center;
  margin-top:5px;
}

.title{
  font-size:clamp(3rem,7vw,6rem);
  color:var(--maroon);
  text-shadow:0 5px 15px rgba(0,0,0,.15);
}

.book-word{
  display:block;
  margin-top:-10px;
  font-size:clamp(2rem,5vw,4rem);
  animation:swing 3s infinite;
}

@keyframes swing{
  0%,100%{transform:rotate(2deg);}
  50%{transform:rotate(-3deg);}
}

/* divider */
.divider{
  margin:15px auto;
  width:80%;
  height:2px;
  background:linear-gradient(to right,transparent,gold,transparent);
}

/* ================= BOOK ================= */
.scene{
  margin-top:40px;
  text-align:center;
}

.book-img{
  width:90%;
  max-width:520px;
}

/* ================= BUTTON ================= */
.btn{
  margin-top:25px;
  padding:18px 45px;
  font-size:1.1rem;
  border-radius:50px;
  border:2px solid var(--gold);
  background:linear-gradient(#8b2a20,#5a120d);
  color:#fff;
}

/* ================= OPEN BOOK ================= */
.open{
  display:none;
  margin-top:30px;
  justify-content:center;
}

.open.active{ display:flex; }

.page{
  width:90%;
  max-width:500px;
  background:#fffdf7;
  border:3px solid #c79a5a;
  padding:25px;
  border-radius:10px;
}

.page h2{
  text-align:center;
  margin-bottom:10px;
}

.page p{
  line-height:1.8;
  font-size:14px;
}

.back-btn{
  margin-top:15px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav-section">
  <img src="navigationbar.png" class="nav-image">

  <a class="nav-btn home">Home</a>
  <a class="nav-btn about">About</a>
  <a class="nav-btn login">Login</a>
  <a class="nav-btn more">More</a>
</div>

<!-- TITLE -->
<div class="hero">
  <div class="title">
    My Secret
    <span class="book-word">Book</span>
  </div>

  <div class="divider"></div>
</div>

<!-- BOOK -->
<div class="scene" id="closed">
  <img src="book.png" class="book-img">

  <br>
  <button class="btn" onclick="openBook()">Next</button>
</div>

<!-- OPEN BOOK -->
<div class="open" id="open">
  <div class="page">
    <h2>Welcome ✨</h2>

    <p>
      Pyare dost,<br><br>
      Is secret book me aapka swagat hai.<br>
      Yeh aapki personal duniya hai jahan aap apne thoughts likh sakte ho.<br><br>
      Har page ek naya secret hai...<br>
      Har word ek feeling hai...<br><br>
      Welcome to your world 💛
    </p>

    <button class="btn back-btn" onclick="closeBook()">Back</button>
  </div>
</div>

<script>
function openBook(){
  document.getElementById("closed").style.display="none";
  document.getElementById("open").classList.add("active");
}

function closeBook(){
  document.getElementById("closed").style.display="block";
  document.getElementById("open").classList.remove("active");
}
</script>

</body>
</html>
