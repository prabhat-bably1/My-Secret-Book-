<!DOCTYPE html>
<html>
<head>
  <title>My Secret Book</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: rgba(0,0,0,0.3);
    }

    .navbar button {
      margin-left: 10px;
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .page {
      display: none;
      padding: 20px;
      text-align: center;
    }

    .active {
      display: block;
    }

    textarea {
      width: 80%;
      height: 80px;
      border-radius: 10px;
      padding: 10px;
    }

    li {
      background: rgba(255,255,255,0.2);
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .lang-bar {
      margin: 10px;
      font-size: 14px;
    }

    .lang-bar span {
      cursor: pointer;
      color: #22c55e;
      margin: 0 5px;
    }
  </style>

</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <h2>🔒 SecretBook</h2>
  <div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('about')">About</button>
    <button onclick="showPage('login')">Login</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Welcome to My Secret Book 🔐</h1>
  <p>Your private space to keep secrets safe.</p>
</div>

<!-- ABOUT -->
<div id="about" class="page">

  <h1 id="aboutTitle"></h1>

  <!-- Languages -->
  <div class="lang-bar">
    <span onclick="setLang('en')">English</span> |
<span onclick="setLang('hi')">Hindi</span> |
<span onclick="setLang('od')">Odia</span> |
<span onclick="setLang('ta')">Tamil</span> |
<span onclick="setLang('te')">Telugu</span> |
<span onclick="setLang('mr')">Marathi</span> |
<span onclick="setLang('bn')">Bengali</span> |
<span onclick="setLang('gu')">Gujarati</span> |
<span onclick="setLang('pa')">Punjabi</span> |
<span onclick="setLang('kn')">Kannada</span> |
<span onclick="setLang('ml')">Malayalam</span>
  </div>

  <p id="about1"></p>
  <p id="about2"></p>
  <p id="about3"></p>
  <p id="about4"></p>

</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h1>Login 🔐</h1>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="checkPassword()">Login</button>
</div>

<!-- APP -->
<div id="app" class="page">
  <h1>Your Secrets</h1>

  <textarea id="secretInput" placeholder="Write your secret..."></textarea><br>

  <button onclick="startVoice()">🎤 Speak</button>
  <button onclick="saveSecret()">Save</button>

  <ul id="secretList"></ul>
</div>

<script>

let secrets = JSON.parse(localStorage.getItem("secrets")) || [];
const password = "1234";

// Page switch
function showPage(pageId) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
}

// Login
function checkPassword() {
  let input = document.getElementById("passwordInput").value;

  if (input === password) {
    showPage("app");
    displaySecrets();
  } else {
    alert("Wrong Password ❌");
  }
}

// Save
function saveSecret() {
  let input = document.getElementById("secretInput");

  if (input.value === "") return;

  secrets.push(input.value);
  localStorage.setItem("secrets", JSON.stringify(secrets));

  input.value = "";
  displaySecrets();
}

// Display
function displaySecrets() {
  let list = document.getElementById("secretList");
  list.innerHTML = "";

  secrets.forEach((s) => {
    let li = document.createElement("li");
    li.textContent = s;
    list.appendChild(li);
  });
}

// Voice input
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";

  recognition.onresult = function(event) {
    document.getElementById("secretInput").value = event.results[0][0].transcript;
  };

  recognition.start();
}

// About language
function setLang(lang) {

  if (lang === "en") {
    aboutTitle.textContent = "About My Secret Book";
    about1.textContent = "My Secret Book is not just a website — it’s a personal space where your secrets stay safe and truly yours.";
    about2.textContent = "Everyone has something they cannot say out loud.";
    about3.textContent = "This website does not belong to me alone. Whoever trusts it, owns it.";
    about4.textContent = "Simple, secure, and personal.";
  }

  else if (lang === "hi") {
    aboutTitle.textContent = "मेरी सीक्रेट बुक के बारे में";
    about1.textContent = "यह सिर्फ एक वेबसाइट नहीं है — यह आपकी अपनी जगह है जहाँ आपके राज सुरक्षित रहते हैं।";
    about2.textContent = "हर किसी के पास कुछ होता है जो वो नहीं कह पाता।";
    about3.textContent = "यह वेबसाइट सिर्फ मेरी नहीं है, जो इसे अपना समझेगा यह उसकी हो जाएगी।";
    about4.textContent = "सुरक्षित और व्यक्तिगत।";
  }

  else if (lang === "od") {
    aboutTitle.textContent = "ମୋ ସିକ୍ରେଟ ବୁକ ବିଷୟରେ";
    about1.textContent = "ଏହା ତୁମର ନିଜସ୍ୱ ସ୍ଥାନ ଯେଉଁଠି ରହସ୍ୟ ସୁରକ୍ଷିତ ରହେ।";
    about2.textContent = "ପ୍ରତ୍ୟେକଙ୍କ ପାଖରେ କିଛି ଅଛି ଯାହା ସେ କହିପାରେ ନାହିଁ।";
    about3.textContent = "ଏହା ସମସ୍ତଙ୍କର ହେବା ପାଇଁ ତିଆରି।";
    about4.textContent = "ସରଳ ଏବଂ ସୁରକ୍ଷିତ।";
  }

}

// default
setLang("en");

</script>

</body>
</html>
