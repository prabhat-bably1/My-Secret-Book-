<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Secret Book</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button>Home</button>
    <button>About</button>
    <button>Login 📖</button>
</div>

<!-- TITLE + HANGING BOOK (UNCHANGED) -->
<div class="main">
    <h1 class="title">
        My Secret <br> Book
    </h1>

    <!-- Hanging Book -->
    <img src="closed-book.png" class="hanging-book">
</div>

<!-- FLIP BOOK SECTION -->
<div class="flip-container">

    <div class="book-box" id="bookBox">

        <!-- FRONT PAGE -->
        <div class="page front">
            <img src="closed-book.png" class="cover-img">
        </div>

        <!-- INSIDE PAGE -->
        <div class="page back">
            <h2>Welcome to your Secret World ✨</h2>
            <p>
                Start your journey here... <br>
                Share your thoughts, jokes, shayari and feelings. <br><br>
                This is your personal space — <br>
                stay happy and spread happiness 💛
            </p>
        </div>

    </div>

    <!-- NEXT BUTTON -->
    <button class="next-btn" onclick="flipBook()">Next ➜</button>

</div>

<script src="script.js"></script>
</body>
</html>
