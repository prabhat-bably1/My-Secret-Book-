<!DOCTYPE html>
<html>
<head>
  <title>My Secret Book</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: rgba(0,0,0,0.3);
    }

    .navbar button {
      margin-left: 10px;
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .page {
      display: none;
      padding: 20px;
      text-align: center;
    }

    .active {
      display: block;
    }

    .lang-bar {
      margin: 15px;
      font-size: 14px;
    }

    .lang-bar span {
      cursor: pointer;
      color: #22c55e;
      margin: 0 5px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <h2>🔒 SecretBook</h2>
  <div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('about')">About</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Welcome to My Secret Book 🔐</h1>
  <p>Your private space to keep secrets safe.</p>
</div>

<!-- ABOUT -->
<div id="about" class="page">

  <h1 id="aboutTitle"></h1>

  <div class="lang-bar">

  <span onclick="setLang('en')">English</span> |
  <span onclick="setLang('hi')">Hindi</span> |
  <span onclick="setLang('od')">Odia</span> |
  <span onclick="setLang('ta')">Tamil</span> |
  <span onclick="setLang('te')">Telugu</span> |
  <span onclick="setLang('mr')">Marathi</span> |
  <span onclick="setLang('bn')">Bengali</span> |
  <span onclick="setLang('gu')">Gujarati</span> |
  <span onclick="setLang('pa')">Punjabi</span> |
  <span onclick="setLang('kn')">Kannada</span> |
  <span onclick="setLang('ml')">Malayalam</span>

  </div>
  <p id="about1"></p>
  <p id="about2"></p>
  <p id="about3"></p>
  <p id="about4"></p>

</div>

<script>

// Page switch
function showPage(pageId) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(pageId).classList.add("active");
}

// Language function (100% working)
function setLang(lang) {

  let title = document.getElementById("aboutTitle");
  let a1 = document.getElementById("about1");
  let a2 = document.getElementById("about2");
  let a3 = document.getElementById("about3");
  let a4 = document.getElementById("about4");

  // ENGLISH DEFAULT
  title.textContent = "About My Secret Book";
  a1.textContent = "My Secret Book is not just a website — it’s a personal space where your secrets stay safe and truly yours.";
  a2.textContent = "Everyone has something they cannot say out loud.";
  a3.textContent = "This website does not belong to me alone. Whoever trusts it, owns it.";
  a4.textContent = "Simple, secure, and personal.";

  // HINDI
  if (lang === "hi") {
    title.textContent = "मेरी सीक्रेट बुक के बारे में";
    a1.textContent = "यह आपकी अपनी जगह है जहाँ आपके राज सुरक्षित रहते हैं।";
    a2.textContent = "हर किसी के पास कुछ होता है जो वो नहीं कह पाता।";
    a3.textContent = "यह वेबसाइट सभी की है।";
    a4.textContent = "सुरक्षित और व्यक्तिगत।";
  }

  // ODIA
  if (lang === "od") {
    title.textContent = "ମୋ ସିକ୍ରେଟ ବୁକ ବିଷୟରେ";
    a1.textContent = "ଏହା ତୁମର ନିଜସ୍ୱ ସ୍ଥାନ।";
    a2.textContent = "ପ୍ରତ୍ୟେକଙ୍କ ପାଖରେ କିଛି ଅଛି।";
    a3.textContent = "ଏହା ସମସ୍ତଙ୍କର।";
    a4.textContent = "ସୁରକ୍ଷିତ।";
  }

  // TAMIL
  if (lang === "ta") {
    title.textContent = "என் ரகசிய புத்தகம் பற்றி";
    a1.textContent = "இது உங்கள் ரகசியங்களுக்கான இடம்.";
    a2.textContent = "ஒவ்வொருவருக்கும் சொல்ல முடியாத விஷயங்கள் உள்ளன.";
    a3.textContent = "இந்த வலைத்தளம் அனைவருக்கும்.";
    a4.textContent = "பாதுகாப்பானது.";
  }

  // TELUGU
  if (lang === "te") {
    title.textContent = "నా సీక్రెట్ బుక్ గురించి";
    a1.textContent = "ఇది మీ రహస్యాల కోసం ఒక స్థలం.";
    a2.textContent = "ప్రతి ఒక్కరికి చెప్పలేని విషయాలు ఉంటాయి.";
    a3.textContent = "ఈ వెబ్‌సైట్ అందరిది.";
    a4.textContent = "సురక్షితమైనది.";
  }

  // MARATHI
  if (lang === "mr") {
    title.textContent = "माझ्या सिक्रेट बुक बद्दल";
    a1.textContent = "ही तुमच्या गुपितांसाठी जागा आहे.";
    a2.textContent = "प्रत्येकाकडे काहीतरी असतं.";
    a3.textContent = "ही वेबसाइट सगळ्यांची आहे.";
    a4.textContent = "सुरक्षित.";
  }
}

// Default load
setLang("en");

</script>

</body>
</html>
