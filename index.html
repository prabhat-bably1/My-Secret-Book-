<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Secret Book</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Georgia, serif;
      background:#1e100b;
    }

    body{
      position:relative;
    }

    .screen{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      transition:opacity .6s ease, transform .6s ease;
    }

    /* ================= SCREEN 1 ================= */
    #screen1{
      z-index:2;
      opacity:1;
      transform:scale(1);
      background:#2a160f;
    }

    #screen1.hide{
      opacity:0;
      pointer-events:none;
      transform:scale(1.02);
    }

    .front-page{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    /* Next button image ke neeche wali jagah par invisible hotspot */
    .next-hotspot{
      position:absolute;
      left:50%;
      bottom:7.2%;
      transform:translateX(-50%);
      width:min(150px, 32vw);
      height:min(62px, 12vw);
      background:transparent;
      border:none;
      cursor:pointer;
      z-index:5;
    }

    /* ================= SCREEN 2 ================= */
    #screen2{
      z-index:1;
      opacity:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,231,186,.22), transparent 20%),
        linear-gradient(180deg, #2a160f 0%, #5c3120 20%, #b17848 45%, #e0c79d 58%, #b87e4d 77%, #472319 100%);
      overflow:hidden;
    }

    #screen2.show{
      opacity:1;
      pointer-events:auto;
    }

    .back-btn{
      position:absolute;
      top:18px;
      left:18px;
      z-index:50;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-size:14px;
      color:#fff2d8;
      background:linear-gradient(180deg, #724429 0%, #432216 100%);
      box-shadow:0 8px 18px rgba(0,0,0,.25);
      cursor:pointer;
    }

    .magic{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .glow{
      position:absolute;
      border-radius:50%;
      background:rgba(255,224,160,.18);
      filter:blur(18px);
      animation:pulse 3s ease-in-out infinite;
    }

    .spark{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(255,230,180,.95);
      box-shadow:
        0 0 10px rgba(255,214,130,.7),
        0 0 18px rgba(255,214,130,.35);
      animation:twinkle linear infinite;
    }

    .spark.star{
      width:12px;
      height:12px;
      background:transparent;
      box-shadow:none;
    }

    .spark.star::before,
    .spark.star::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:rgba(255,239,202,.98);
      border-radius:20px;
      box-shadow:0 0 10px rgba(255,216,132,.7);
    }

    .spark.star::before{
      width:2px;
      height:18px;
    }

    .spark.star::after{
      width:18px;
      height:2px;
    }

    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:.7;}
      50%{transform:scale(1.08);opacity:1;}
    }

    @keyframes twinkle{
      0%{opacity:.2;transform:translateY(0) scale(.7);}
      50%{opacity:1;transform:translateY(-10px) scale(1);}
      100%{opacity:.15;transform:translateY(-20px) scale(.75);}
    }

    .petal{
      position:absolute;
      width:18px;
      height:10px;
      background:linear-gradient(90deg,#df8d98,#bc5968);
      border-radius:85% 20% 75% 30%;
      opacity:.8;
      box-shadow:0 0 10px rgba(255,150,170,.18);
      animation:fall linear infinite;
    }

    @keyframes fall{
      0%{transform:translateY(-30px) rotate(0deg);opacity:0;}
      12%{opacity:.85;}
      100%{transform:translateY(110vh) translateX(46px) rotate(340deg);opacity:.14;}
    }

    .title{
      position:absolute;
      top:7%;
      left:50%;
      transform:translateX(-50%);
      width:90%;
      text-align:center;
      color:#f8cf8e;
      font-size:clamp(40px, 8vw, 88px);
      line-height:1;
      font-style:italic;
      text-shadow:
        0 0 10px rgba(255,215,130,.44),
        0 0 22px rgba(255,215,130,.22),
        0 0 48px rgba(255,215,130,.16);
      z-index:10;
    }

    .title-line{
      margin-top:10px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:14px;
      color:#efc36b;
      font-size:24px;
    }

    .title-line .line{
      width:min(130px, 22vw);
      height:2px;
      background:linear-gradient(90deg, transparent, #d8a450, transparent);
      border-radius:50px;
    }

    .stage{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      perspective:2000px;
      padding:80px 20px 90px;
    }

    .ground-glow{
      position:absolute;
      bottom:13%;
      width:min(420px, 72vw);
      height:72px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,205,101,.66) 0%, rgba(255,205,101,.18) 38%, transparent 72%);
      filter:blur(16px);
      animation:groundPulse 2.8s ease-in-out infinite;
    }

    @keyframes groundPulse{
      0%,100%{transform:scale(1);opacity:.86;}
      50%{transform:scale(1.08);opacity:1;}
    }

    .book-wrap{
      position:relative;
      width:min(340px, 76vw);
      height:min(460px, 90vw);
      transform-style:preserve-3d;
      animation:floatBook 4s ease-in-out infinite;
      cursor:pointer;
      z-index:5;
    }

    @keyframes floatBook{
      0%,100%{transform:translateY(0) rotate(-9deg);}
      50%{transform:translateY(-14px) rotate(-7deg);}
    }

    .book{
      position:relative;
      width:100%;
      height:100%;
      transform-style:preserve-3d;
      transition:transform 1.2s cubic-bezier(.22,.7,.12,1);
      filter:drop-shadow(0 18px 26px rgba(0,0,0,.35));
    }

    .book-wrap.open .book{
      transform:rotateY(-155deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:22px;
      overflow:hidden;
    }

    /* cover made from CSS */
    .front{
      background:
        radial-gradient(circle at 50% 40%, rgba(230,180,90,.18), transparent 32%),
        linear-gradient(180deg, #3a281f 0%, #1d1512 100%);
      border:8px solid #9b6a36;
      box-shadow:
        inset 0 0 0 3px rgba(209,162,88,.55),
        inset 0 0 0 10px rgba(78,46,27,.75);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .front::before{
      content:"";
      position:absolute;
      inset:22px;
      border:2px solid rgba(214,171,94,.45);
      border-radius:14px;
    }

    .front::after{
      content:"";
      position:absolute;
      left:50%;
      top:52%;
      transform:translate(-50%,-50%);
      width:120px;
      height:120px;
      border-radius:50%;
      border:5px solid rgba(222,180,98,.7);
      box-shadow:
        0 0 0 8px rgba(90,55,31,.65),
        0 0 0 12px rgba(222,180,98,.28);
    }

    .cover-text{
      position:relative;
      z-index:2;
      text-align:center;
      color:#f5cd85;
      text-shadow:0 2px 8px rgba(0,0,0,.45);
      max-width:70%;
    }

    .cover-text .small{
      font-size:14px;
      letter-spacing:2px;
      margin-bottom:10px;
    }

    .cover-text .big{
      font-size:46px;
      line-height:0.95;
      font-weight:bold;
    }

    .corner{
      position:absolute;
      width:58px;
      height:58px;
      border:6px solid #b97a3f;
      border-radius:14px;
      background:linear-gradient(180deg,#d59a53 0%, #8d5a2f 100%);
      box-shadow:0 4px 10px rgba(0,0,0,.2);
    }

    .corner.tl{top:-8px;left:-8px;}
    .corner.tr{top:-8px;right:-8px;}
    .corner.bl{bottom:-8px;left:-8px;}
    .corner.br{bottom:-8px;right:-8px;}

    .strap{
      position:absolute;
      background:linear-gradient(180deg,#6f4329 0%,#432216 100%);
      box-shadow:0 3px 8px rgba(0,0,0,.25);
      border:2px solid rgba(183,122,63,.65);
    }

    .strap.left{
      width:110px;
      height:20px;
      left:-8px;
      top:42%;
      border-radius:0 12px 12px 0;
    }

    .strap.right{
      width:22px;
      height:120px;
      right:-8px;
      top:36%;
      border-radius:12px 0 0 12px;
    }

    .seal{
      position:absolute;
      width:36px;
      height:36px;
      border-radius:50%;
      background:radial-gradient(circle, #d7a257 0%, #8a592f 100%);
      box-shadow:0 2px 8px rgba(0,0,0,.3);
      border:3px solid rgba(110,70,35,.7);
    }

    .seal.one{left:88px;top:38%;}
    .seal.two{right:-18px;top:52%;}

    /* inside page */
    .back{
      transform:rotateY(180deg);
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
    }

    .inside-page{
      width:94%;
      height:94%;
      border-radius:20px;
      background:
        radial-gradient(circle at top, rgba(255,245,220,.7), transparent 26%),
        linear-gradient(180deg, #fff7e7 0%, #ecd9b6 100%);
      box-shadow:
        inset 0 0 0 1px rgba(140,100,65,.18),
        inset 0 0 24px rgba(140,100,65,.08),
        0 10px 20px rgba(0,0,0,.14);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      text-align:center;
      color:#734c35;
    }

    .inside-page::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.22;
      background-image:linear-gradient(rgba(145,101,64,.12) 1px, transparent 1px);
      background-size:100% 36px;
      pointer-events:none;
    }

    .inside-page::after{
      content:"";
      position:absolute;
      left:52%;
      top:0;
      width:2px;
      height:100%;
      background:linear-gradient(180deg, rgba(171,126,84,0.08), rgba(120,79,48,0.25), rgba(171,126,84,0.08));
      box-shadow:0 0 8px rgba(138,91,55,0.12);
      pointer-events:none;
    }

    .welcome{
      position:relative;
      z-index:2;
      max-width:84%;
    }

    .welcome h2{
      font-size:48px;
      color:#915b39;
      margin-bottom:18px;
      font-style:italic;
    }

    .welcome p{
      font-size:18px;
      line-height:1.9;
      margin-bottom:10px;
    }

    .welcome .sign{
      margin-top:14px;
      font-size:28px;
      color:#a06744;
      font-style:italic;
    }

    .controls{
      position:absolute;
      left:50%;
      bottom:28px;
      transform:translateX(-50%);
      z-index:20;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .action-btn{
      min-width:120px;
      height:46px;
      border:none;
      border-radius:12px;
      padding:0 18px;
      font-size:15px;
      color:#fff2d8;
      background:linear-gradient(180deg, #724429 0%, #432216 100%);
      box-shadow:0 8px 18px rgba(0,0,0,.25);
      cursor:pointer;
    }

    @media (max-width:700px){
      .next-hotspot{
        width:120px;
        height:52px;
        bottom:7%;
      }

      .title{
        top:9%;
        font-size:clamp(34px, 10vw, 58px);
      }

      .book-wrap{
        width:min(280px, 78vw);
        height:min(380px, 92vw);
      }

      .cover-text .small{
        font-size:11px;
      }

      .cover-text .big{
        font-size:34px;
      }

      .welcome h2{
        font-size:34px;
      }

      .welcome p{
        font-size:14px;
        line-height:1.8;
      }

      .welcome .sign{
        font-size:22px;
      }

      .controls{
        bottom:18px;
      }

      .action-btn,
      .back-btn{
        height:42px;
        font-size:13px;
      }
    }
  </style>
</head>
<body>

  <!-- SCREEN 1 -->
  <section id="screen1" class="screen">
    <img src="front-page.png" alt="My Secret Book Front Page" class="front-page">
    <button class="next-hotspot" id="goNext" aria-label="Go Next"></button>
  </section>

  <!-- SCREEN 2 -->
  <section id="screen2" class="screen">
    <button class="back-btn" id="goBack">← Back</button>

    <div class="magic" id="magic"></div>

    <div class="title">
      My Secret Book
      <div class="title-line">
        <span class="line"></span>
        <span>ღ</span>
        <span class="line"></span>
      </div>
    </div>

    <div class="stage">
      <div class="ground-glow"></div>

      <div class="book-wrap" id="bookWrap">
        <div class="book" id="book">
          <div class="face front">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <div class="strap left"></div>
            <div class="strap right"></div>

            <div class="seal one"></div>
            <div class="seal two"></div>

            <div class="cover-text">
              <div class="small">TOME OF</div>
              <div class="big">ARCANE<br>SECRETS</div>
            </div>
          </div>

          <div class="face back">
            <div class="inside-page">
              <div class="welcome">
                <h2>Welcome</h2>
                <p>
                  Welcome to <b>My Secret Book</b> ✨
                </p>
                <p>
                  A magical little place where memories glow,
                  feelings stay safe, and every page holds
                  something beautiful.
                </p>
                <p>
                  Open this book with love,<br>
                  and let your heart read<br>
                  what words cannot fully say.
                </p>
                <div class="sign">With Love 💖</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="action-btn" id="flipBtn">Open Book</button>
    </div>
  </section>

  <script>
    const screen1 = document.getElementById("screen1");
    const screen2 = document.getElementById("screen2");
    const goNext = document.getElementById("goNext");
    const goBack = document.getElementById("goBack");
    const bookWrap = document.getElementById("bookWrap");
    const flipBtn = document.getElementById("flipBtn");
    const magic = document.getElementById("magic");

    let isOpen = false;

    goNext.addEventListener("click", () => {
      screen1.classList.add("hide");
      screen2.classList.add("show");
    });

    goBack.addEventListener("click", () => {
      screen2.classList.remove("show");
      screen1.classList.remove("hide");
      isOpen = false;
      bookWrap.classList.remove("open");
      flipBtn.textContent = "Open Book";
    });

    function toggleBook() {
      isOpen = !isOpen;
      bookWrap.classList.toggle("open", isOpen);
      flipBtn.textContent = isOpen ? "Close Book" : "Open Book";
    }

    flipBtn.addEventListener("click", toggleBook);
    bookWrap.addEventListener("click", toggleBook);

    function addGlow(x, y, w, h) {
      const g = document.createElement("div");
      g.className = "glow";
      g.style.left = x + "%";
      g.style.top = y + "%";
      g.style.width = w + "px";
      g.style.height = h + "px";
      magic.appendChild(g);
    }

    function addSpark(x, y, size, duration, star = false) {
      const s = document.createElement("div");
      s.className = star ? "spark star" : "spark";
      s.style.left = x + "%";
      s.style.top = y + "%";
      s.style.width = size + "px";
      s.style.height = size + "px";
      s.style.animationDuration = duration + "s";
      s.style.animationDelay = (Math.random() * 2) + "s";
      magic.appendChild(s);
    }

    function addPetal(x, delay, duration, scale) {
      const p = document.createElement("div");
      p.className = "petal";
      p.style.left = x + "%";
      p.style.top = (-20 - Math.random() * 20) + "px";
      p.style.animationDelay = delay + "s";
      p.style.animationDuration = duration + "s";
      p.style.transform = `scale(${scale})`;
      magic.appendChild(p);
    }

    addGlow(18, 22, 180, 180);
    addGlow(72, 20, 190, 190);
    addGlow(45, 68, 260, 100);

    for (let i = 0; i < 48; i++) {
      addSpark(
        Math.random() * 100,
        Math.random() * 100,
        4 + Math.random() * 6,
        2 + Math.random() * 3,
        Math.random() > 0.84
      );
    }

    for (let i = 0; i < 10; i++) {
      addPetal(
        Math.random() * 100,
        Math.random() * 8,
        10 + Math.random() * 8,
        0.7 + Math.random() * 0.8
      );
    }
  </script>
</body>
</html>
