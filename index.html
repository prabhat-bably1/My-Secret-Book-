<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Secret Book</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --gold:#f2c97b;
      --gold-soft:#ffe2aa;
      --gold-line:#dba554;
      --brown-1:#2b160f;
      --brown-2:#4f2a1b;
      --brown-3:#73452c;
      --paper-1:#fff6e3;
      --paper-2:#ecd9b5;
      --ink:#714a34;
      --rose:#b1455a;
      --leaf:#355d2d;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      font-family:'Cinzel', serif;
      background:#2b160f;
    }

    body{
      color:#fff4dd;
      background:
        radial-gradient(circle at 50% 28%, rgba(255,232,190,.34) 0%, rgba(255,232,190,.14) 18%, transparent 42%),
        radial-gradient(circle at 20% 20%, rgba(255,220,160,.07) 0%, transparent 18%),
        radial-gradient(circle at 80% 22%, rgba(255,220,160,.07) 0%, transparent 18%),
        linear-gradient(180deg,#2a160f 0%,#5d3220 18%,#b17848 45%,#e0c79d 58%,#b87e4d 77%,#472319 100%);
      position:relative;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.12;
      background-image:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,.18) 0 2px, transparent 3px),
        radial-gradient(circle at 84% 24%, rgba(255,255,255,.12) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 80%, rgba(255,255,255,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 72%, rgba(255,255,255,.10) 0 2px, transparent 3px);
      z-index:0;
    }

    .page{
      position:relative;
      min-height:100vh;
      z-index:1;
    }

    /* side roses */
    .rose-side{
      position:absolute;
      width:210px;
      height:360px;
      pointer-events:none;
      opacity:.9;
      z-index:1;
      filter:drop-shadow(0 10px 14px rgba(0,0,0,.16));
    }

    .rose-side.lt{ left:-24px; top:110px; }
    .rose-side.lb{ left:-28px; bottom:5px; }
    .rose-side.rt{ right:-18px; top:110px; }
    .rose-side.rb{ right:-18px; bottom:5px; }

    .rose-side::before,
    .rose-side::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 18% 18%, rgba(177,69,90,.96) 0 9%, transparent 10%),
        radial-gradient(circle at 28% 14%, rgba(123,34,51,.96) 0 7%, transparent 8%),
        radial-gradient(circle at 36% 25%, rgba(198,98,116,.9) 0 10%, transparent 11%),
        radial-gradient(circle at 78% 72%, rgba(177,69,90,.96) 0 10%, transparent 11%),
        radial-gradient(circle at 68% 80%, rgba(123,34,51,.95) 0 8%, transparent 9%),
        radial-gradient(circle at 16% 82%, rgba(177,69,90,.95) 0 10%, transparent 11%),
        linear-gradient(126deg, transparent 35%, rgba(53,93,45,.86) 36%, transparent 38%),
        linear-gradient(70deg, transparent 48%, rgba(53,93,45,.82) 49%, transparent 51%),
        linear-gradient(156deg, transparent 63%, rgba(53,93,45,.74) 64%, transparent 66%);
    }

    .rose-side::after{
      transform:scale(.92) translate(10px,8px);
      opacity:.68;
      filter:blur(1px);
    }

    /* particles */
    .effects{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:2;
    }

    .spark{
      position:absolute;
      border-radius:50%;
      background:rgba(255,230,180,.96);
      box-shadow:
        0 0 8px rgba(255,214,130,.75),
        0 0 18px rgba(255,214,130,.35);
      animation:twinkle linear infinite;
    }

    .spark.star{
      background:transparent;
      box-shadow:none;
    }

    .spark.star::before,
    .spark.star::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:rgba(255,239,202,.98);
      border-radius:20px;
      box-shadow:0 0 10px rgba(255,216,132,.7);
    }

    .spark.star::before{ width:2px; height:18px; }
    .spark.star::after{ width:18px; height:2px; }

    .petal{
      position:absolute;
      width:18px;
      height:10px;
      background:linear-gradient(90deg,#df8d98,#bc5968);
      border-radius:85% 20% 75% 30%;
      opacity:.8;
      box-shadow:0 0 10px rgba(255,150,170,.18);
      animation:fall linear infinite;
    }

    @keyframes twinkle{
      0%{opacity:.18;transform:translateY(0) scale(.7);}
      50%{opacity:1;transform:translateY(-10px) scale(1);}
      100%{opacity:.2;transform:translateY(-18px) scale(.76);}
    }

    @keyframes fall{
      0%{transform:translateY(-30px) rotate(0deg);opacity:0;}
      12%{opacity:.85;}
      100%{transform:translateY(110vh) translateX(46px) rotate(340deg);opacity:.14;}
    }

    /* ribbon */
    .top-wrap{
      width:100%;
      display:flex;
      justify-content:center;
      padding:12px 16px 0;
      position:relative;
      z-index:10;
    }

    .top-ribbon{
      width:min(1260px,100%);
      min-height:94px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 42px;
      border-radius:18px;
      background:linear-gradient(180deg,#73472d 0%,#512b1c 46%,#341a11 100%);
      border:2px solid rgba(232,190,111,.52);
      box-shadow:
        0 10px 24px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,231,187,.18),
        inset 0 -2px 0 rgba(0,0,0,.2);
      overflow:visible;
    }

    .top-ribbon::before{
      content:"";
      position:absolute;
      inset:8px 14px;
      border:1px solid rgba(238,204,131,.22);
      border-radius:14px;
      pointer-events:none;
    }

    .tail{
      position:absolute;
      top:8px;
      width:98px;
      height:92px;
      z-index:-1;
      background:linear-gradient(180deg,#75482e 0%,#4d291b 100%);
      filter:drop-shadow(0 10px 10px rgba(0,0,0,.2));
    }

    .tail.left{
      left:-42px;
      clip-path:polygon(100% 10%, 42% 10%, 0 34%, 22% 50%, 0 68%, 42% 92%, 100% 92%, 82% 50%);
      border:2px solid rgba(232,190,111,.34);
      border-right:none;
      border-radius:18px 0 0 18px;
    }

    .tail.right{
      right:-42px;
      clip-path:polygon(0 10%, 58% 10%, 100% 34%, 78% 50%, 100% 68%, 58% 92%, 0 92%, 18% 50%);
      border:2px solid rgba(232,190,111,.34);
      border-left:none;
      border-radius:0 18px 18px 0;
    }

    .curl{
      position:absolute;
      top:62px;
      width:56px;
      height:74px;
      border:2px solid rgba(232,190,111,.32);
      background:linear-gradient(180deg,#653a25 0%,#3c1d14 100%);
      z-index:-2;
      box-shadow:0 8px 12px rgba(0,0,0,.18);
    }

    .curl.left{
      left:-4px;
      border-radius:0 0 28px 28px;
      clip-path:polygon(18% 0,100% 0,100% 100%,38% 88%,24% 50%);
    }

    .curl.right{
      right:-4px;
      border-radius:0 0 28px 28px;
      clip-path:polygon(0 0,82% 0,76% 50%,62% 88%,0 100%);
    }

    .nav-side{
      flex:1;
      display:flex;
      align-items:center;
      gap:22px;
      position:relative;
      z-index:3;
    }

    .nav-side.right{
      justify-content:flex-end;
    }

    .nav-link{
      text-decoration:none;
      color:var(--gold-soft);
      font-size:1.18rem;
      font-weight:500;
      letter-spacing:.25px;
      position:relative;
      text-shadow:0 0 12px rgba(255,220,150,.12);
      transition:.28s ease;
    }

    .nav-link:hover{
      color:#fff3d3;
      transform:translateY(-1px);
      text-shadow:0 0 14px rgba(255,225,159,.28);
    }

    .nav-link::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-7px;
      width:0;
      height:1.5px;
      transform:translateX(-50%);
      background:linear-gradient(90deg,transparent,var(--gold-soft),transparent);
      transition:.28s ease;
    }

    .nav-link:hover::after{ width:100%; }

    .nav-plus,.nav-arrow{
      color:rgba(245,216,163,.82);
      font-size:1rem;
      user-select:none;
    }

    .orn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      color:rgba(233,192,112,.62);
      font-size:2rem;
      pointer-events:none;
      user-select:none;
    }

    .orn.left{ right:50px; }
    .orn.right{ left:50px; }

    .center-book-wrap{
      width:155px;
      height:122px;
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-44%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      z-index:5;
      pointer-events:none;
    }

    .center-glow{
      position:absolute;
      top:18px;
      width:92px;
      height:40px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,220,150,.42) 0%, rgba(255,220,150,.10) 60%, transparent 100%);
      filter:blur(8px);
    }

    .open-book{
      position:relative;
      width:88px;
      height:58px;
      animation:iconFloat 3.2s ease-in-out infinite;
      filter:drop-shadow(0 7px 8px rgba(0,0,0,.22));
    }

    .open-book::before,
    .open-book::after{
      content:"";
      position:absolute;
      top:0;
      width:42px;
      height:54px;
      background:
        repeating-linear-gradient(to bottom, rgba(122,92,58,.35) 0 2px, transparent 2px 6px),
        linear-gradient(180deg,#fff7e7 0%,#ead8b6 100%);
      border:2px solid rgba(145,105,66,.55);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.28);
    }

    .open-book::before{
      left:0;
      border-radius:10px 4px 6px 12px;
      transform:perspective(120px) rotateY(18deg);
      transform-origin:right center;
    }

    .open-book::after{
      right:0;
      border-radius:4px 10px 12px 6px;
      transform:perspective(120px) rotateY(-18deg);
      transform-origin:left center;
    }

    .spine{
      position:absolute;
      left:50%;
      top:4px;
      transform:translateX(-50%);
      width:10px;
      height:48px;
      background:linear-gradient(180deg,#5b3827 0%,#2e170f 100%);
      border-radius:4px;
      z-index:2;
      box-shadow:0 0 0 1px rgba(120,80,50,.35);
    }

    .bookmark{
      width:16px;
      height:24px;
      margin-top:-4px;
      background:linear-gradient(180deg,#d43a35 0%,#8f1111 100%);
      clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%);
      filter:drop-shadow(0 4px 6px rgba(0,0,0,.24));
      position:relative;
      z-index:1;
    }

    @keyframes iconFloat{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-4px);}
    }

    /* main */
    .hero{
      min-height:calc(100vh - 108px);
      display:flex;
      justify-content:center;
      padding:18px 16px 34px;
      position:relative;
      z-index:5;
    }

    .hero-inner{
      width:100%;
      max-width:1280px;
      text-align:center;
      position:relative;
    }

    .title{
      margin-top:30px;
      font-family:'Great Vibes', cursive;
      font-weight:400;
      font-size:clamp(4rem, 9vw, 7.8rem);
      line-height:.96;
      color:#f6c98a;
      text-shadow:
        0 0 10px rgba(255,215,130,.44),
        0 0 22px rgba(255,215,130,.22),
        0 0 48px rgba(255,215,130,.16);
    }

    .title-divider{
      margin-top:8px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:18px;
      color:#efc36b;
      filter:drop-shadow(0 0 8px rgba(255,216,131,.22));
    }

    .title-divider .line{
      width:130px;
      height:2px;
      background:linear-gradient(90deg,transparent,var(--gold-line),transparent);
      border-radius:30px;
      position:relative;
    }

    .title-divider .line::before,
    .title-divider .line::after{
      content:"";
      position:absolute;
      top:50%;
      width:6px;
      height:6px;
      background:var(--gold-line);
      border-radius:50%;
      transform:translateY(-50%);
      opacity:.9;
    }

    .title-divider .line.left::after{ right:10px; }
    .title-divider .line.right::before{ left:10px; }

    .title-divider .mid{
      font-size:2rem;
      transform:translateY(-2px);
    }

    .stage{
      position:relative;
      width:100%;
      min-height:720px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      perspective:2200px;
      margin-top:4px;
    }

    .ground-glow{
      position:absolute;
      bottom:74px;
      width:min(480px,70vw);
      height:86px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,205,101,.66) 0%, rgba(255,205,101,.18) 38%, transparent 72%);
      filter:blur(16px);
      animation:groundPulse 2.8s ease-in-out infinite;
    }

    @keyframes groundPulse{
      0%,100%{transform:scale(1);opacity:.86;}
      50%{transform:scale(1.08);opacity:1;}
    }

    .book-wrap{
      margin-top:20px;
      position:relative;
      width:min(610px,82vw);
      height:min(760px,92vw);
      display:flex;
      justify-content:center;
      align-items:center;
      transform-style:preserve-3d;
      animation:floatMain 4.4s ease-in-out infinite;
      cursor:pointer;
      z-index:5;
    }

    @keyframes floatMain{
      0%,100%{ transform:translateY(0) rotate(-12deg); }
      50%{ transform:translateY(-18px) rotate(-9.5deg); }
    }

    .book3d{
      position:relative;
      width:70%;
      aspect-ratio:.78/1;
      transform-style:preserve-3d;
      transition:transform 1.2s cubic-bezier(.22,.7,.12,1);
      filter:
        drop-shadow(0 18px 28px rgba(0,0,0,.34))
        drop-shadow(0 0 18px rgba(255,216,131,.14));
    }

    .book-wrap.open .book3d{
      transform:rotateY(-158deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      transform-style:preserve-3d;
      border-radius:26px;
      overflow:hidden;
    }

    .front{
      background:
        radial-gradient(circle at 50% 40%, rgba(230,180,90,.18), transparent 32%),
        linear-gradient(180deg, #3a281f 0%, #1d1512 100%);
      border:10px solid #9b6a36;
      box-shadow:
        inset 0 0 0 3px rgba(209,162,88,.55),
        inset 0 0 0 10px rgba(78,46,27,.75);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .front::before{
      content:"";
      position:absolute;
      inset:22px;
      border:2px solid rgba(214,171,94,.45);
      border-radius:14px;
    }

    .front::after{
      content:"";
      position:absolute;
      left:50%;
      top:56%;
      transform:translate(-50%,-50%);
      width:130px;
      height:130px;
      border-radius:50%;
      border:5px solid rgba(222,180,98,.7);
      box-shadow:
        0 0 0 8px rgba(90,55,31,.65),
        0 0 0 12px rgba(222,180,98,.28);
    }

    .cover-text{
      position:relative;
      z-index:2;
      text-align:center;
      color:#f5cd85;
      text-shadow:0 2px 8px rgba(0,0,0,.45);
      max-width:70%;
    }

    .cover-text .small{
      font-size:15px;
      letter-spacing:2px;
      margin-bottom:12px;
    }

    .cover-text .big{
      font-size:50px;
      line-height:.95;
      font-weight:bold;
    }

    .corner{
      position:absolute;
      width:58px;
      height:58px;
      border:6px solid #b97a3f;
      border-radius:14px;
      background:linear-gradient(180deg,#d59a53 0%, #8d5a2f 100%);
      box-shadow:0 4px 10px rgba(0,0,0,.2);
    }

    .corner.tl{top:-8px;left:-8px;}
    .corner.tr{top:-8px;right:-8px;}
    .corner.bl{bottom:-8px;left:-8px;}
    .corner.br{bottom:-8px;right:-8px;}

    .strap{
      position:absolute;
      background:linear-gradient(180deg,#6f4329 0%,#432216 100%);
      box-shadow:0 3px 8px rgba(0,0,0,.25);
      border:2px solid rgba(183,122,63,.65);
    }

    .strap.left{
      width:112px;
      height:22px;
      left:-8px;
      top:42%;
      border-radius:0 12px 12px 0;
    }

    .strap.right{
      width:24px;
      height:128px;
      right:-8px;
      top:35%;
      border-radius:12px 0 0 12px;
    }

    .seal{
      position:absolute;
      width:38px;
      height:38px;
      border-radius:50%;
      background:radial-gradient(circle, #d7a257 0%, #8a592f 100%);
      box-shadow:0 2px 8px rgba(0,0,0,.3);
      border:3px solid rgba(110,70,35,.7);
    }

    .seal.one{left:90px;top:39%;}
    .seal.two{right:-18px;top:53%;}

    .back{
      transform:rotateY(180deg);
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
    }

    .inside-page{
      width:94%;
      height:94%;
      border-radius:24px;
      background:
        radial-gradient(circle at top, rgba(255,245,220,.7), transparent 26%),
        linear-gradient(180deg, var(--paper-1) 0%, var(--paper-2) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(140,100,65,.18),
        inset 0 0 24px rgba(140,100,65,.08),
        0 10px 20px rgba(0,0,0,.14);
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      text-align:center;
      color:var(--ink);
    }

    .inside-page::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.22;
      background-image:linear-gradient(rgba(145,101,64,.12) 1px, transparent 1px);
      background-size:100% 36px;
      pointer-events:none;
    }

    .inside-page::after{
      content:"";
      position:absolute;
      left:52%;
      top:0;
      width:2px;
      height:100%;
      background:linear-gradient(180deg, rgba(171,126,84,0.08), rgba(120,79,48,0.25), rgba(171,126,84,0.08));
      box-shadow:0 0 8px rgba(138,91,55,0.12);
      pointer-events:none;
    }

    .welcome{
      position:relative;
      z-index:2;
      max-width:84%;
      font-family:Georgia, serif;
    }

    .welcome h2{
      font-family:'Great Vibes', cursive;
      font-size:3.4rem;
      color:#915b39;
      margin-bottom:16px;
    }

    .welcome p{
      font-size:1.08rem;
      line-height:1.9;
      margin-bottom:10px;
    }

    .welcome .sign{
      margin-top:14px;
      font-family:'Great Vibes', cursive;
      font-size:2rem;
      color:#a06744;
    }

    .controls{
      position:absolute;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      z-index:20;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .action-btn{
      min-width:120px;
      height:46px;
      border:none;
      border-radius:12px;
      padding:0 18px;
      font-size:15px;
      color:#fff2d8;
      background:linear-gradient(180deg,#724429 0%,#432216 100%);
      box-shadow:0 8px 18px rgba(0,0,0,.25);
      cursor:pointer;
    }

    @media (max-width:980px){
      .top-ribbon{min-height:86px;padding:0 18px;}
      .nav-side{gap:12px;}
      .nav-link{font-size:.98rem;}
      .orn{display:none;}

      .center-book-wrap{width:108px;height:92px;}
      .open-book{width:68px;height:46px;}
      .open-book::before,.open-book::after{width:32px;height:42px;}
      .spine{height:38px;}

      .title{font-size:clamp(3.2rem, 12vw, 5.8rem);}
      .title-divider .line{width:78px;}

      .stage{min-height:620px;}
      .book-wrap{width:min(520px,88vw);height:min(620px,100vw);}
      .book3d{width:74%;}
      .cover-text .big{font-size:42px;}
    }

    @media (max-width:640px){
      .top-wrap{padding:10px 8px 0;}
      .top-ribbon{min-height:74px;padding:0 12px;border-radius:15px;}
      .top-ribbon::before{inset:6px 8px;border-radius:11px;}
      .tail{width:42px;height:42px;top:16px;}
      .tail.left{left:-12px;}
      .tail.right{right:-12px;}
      .curl{display:none;}

      .nav-side{gap:8px;}
      .nav-link{font-size:.78rem;}
      .nav-plus,.nav-arrow{font-size:.72rem;}

      .center-book-wrap{width:66px;height:70px;transform:translate(-50%,-47%);}
